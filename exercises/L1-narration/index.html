<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narration Exercise — Korean LLM</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>📖 Narration Exercise</h1>
      <p class="subtitle">
        The LLM creates a character-introduction story, then builds three sets
        of fill-in-the-blank exercises.
      </p>
    </header>

    <main>
      <div class="controls">
        <label class="count-label">
          Exercises per section:
          <input type="number" id="count" value="3" min="1" max="8" step="1" />
        </label>
        <button id="generate-btn">Generate Story + Exercises</button>
      </div>

      <div id="loading" class="spinner-box hidden">
        <div class="spinner"></div>
        <p>Generating narration and exercises…</p>
      </div>

      <div id="error" class="hidden"></div>
      <div id="results" class="hidden"></div>
    </main>

    <footer><a href="/">← Back to exercises</a></footer>
    <script src="app.js"></script>
  </body>
</html>
